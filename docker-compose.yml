services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=entity_platform
      - POSTGRES_USER=entity
      - POSTGRES_PASSWORD=entity_pass
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U entity -d entity_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql://entity:entity_pass@db:5432/entity_platform
      - SECRET_KEY=change-this-secret-key-before-deploy
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
